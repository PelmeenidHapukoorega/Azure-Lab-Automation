apiVersion: apps/v1
kind: Deployment
metadata:
  name: simplemetrics
  labels:
    app: simplemetrics
spec:
  replicas: 2
  selector:
    matchLabels:
      app: simplemetrics
  template:
    metadata:
      labels:
        app: simplemetrics
    spec:
      serviceAccountName: simplemetrics
      containers:
      - name: simplemetrics
        image: simplemetricsregistry.azurecr.io/simplemetrics:latest
        ports:
        - containerPort: 5000
        env:
        - name: POD_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "500m"
            memory: "256Mi"
        readinessProbe:
          httpGet:
            path: /health
            port: 5000
          initialDelaySeconds: 5
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /health
            port: 5000
          initialDelaySeconds: 15
          periodSeconds: 20