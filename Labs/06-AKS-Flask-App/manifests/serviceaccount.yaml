apiVersion: v1
kind: ServiceAccount
metadata:
  name: simplemetrics
  namespace: default
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role 
metadata: 
  name: simplemetrics-pod-reader
  namespace: default
rules:
- apiGroups: [""]
  resources: ["pods"]
  verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding 
metadata: 
  name: simplemetrics-pod-reader
  namespace: default
subjects:
- kind: ServiceAccount
  name: simplemetrics
  namespace: default
roleRef: 
  kind: Role
  name: simplemetrics-pod-reader
  apiGroup: rbac.authorization.k8s.io