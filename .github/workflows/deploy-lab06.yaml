name: Deploy lab 06 - SimpleMetrics AKS

on:
  push:
    paths:
      - 'Labs/06-AKS-Flask-App/app/**'
      - 'Labs/06-AKS-Flask-App/manifests/**'
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  ACR_NAME: simplemetricsregistry
  AKS_CLUSTER: simplemetrics-aks 
  RESOURCE_GROUP: simplemetrics-rg 
  IMAGE_NAME: simplemetrics

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Log in to Azure
      uses: actions/checkout@v3

    - name: Log in to Azure
      uses: azure/login@v1
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}

    - name: Log in to Azure
      uses: azure/login@v1
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}

    - name: Log in to ACR
      run: az acr login --name ${{ env.ACR_NAME }}

    - name: Build and push Docker image
      run: |    
        docker build -t ${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:${{ github.sha }} \
            -t ${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:latest \
            Labs/06-AKS-Flask-App/app/
          docker push ${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:${{ github.sha }}
          docker push ${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:latest

    - name: Get AKS credentials 
      run: |
        az aks get-credentials \
          --name ${{ env.AKS_CLUSTER }} \
          --resource-group ${{ env.RESOURCE_GROUP }} \
          --overwrite-existing

    - name: Deploy to AKS
      run: |
        kubectl apply -f Labs/06-AKS-Flask-App/manifests/
        kubectl set image deployment/${{ env.IMAGE_NAME }} \
          ${{ env.IMAGE_NAME }}=${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:${{ github.sha }}

    - name: Verify rollout
      run: |
        kubectl rollout status deployment/${{ env.IMAGE_NAME }} --timeout=300s

